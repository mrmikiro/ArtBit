name: artbit
description: ArtBit - Personal art collection management app with ultra-minimalist design.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  image_picker: ^1.0.7
  uuid: ^4.2.1
  path_provider: ^2.1.2
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  flutter_staggered_animations: ^1.1.1
  google_fonts: ^6.1.0
  sqflite: ^2.3.2
  path: ^1.9.0
  shared_preferences: ^2.5.5
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
